<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b0f14">
    <title>Hitster DLC Beolvasó</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode/minified/html5-qrcode.min.js"></script>
</head>

<body>
    <main class="app-shell">
        <section class="scanner-panel" aria-label="Hitster DLC beolvasó">
            <div class="brand-row">
                <div class="brand-mark" aria-hidden="true">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <p>Hitster DLC</p>
            </div>

            <div class="scan-stage">
                <div id="qr-reader" class="qr-reader" aria-label="QR kód olvasó"></div>
                <div id="idle-state" class="idle-state">
                    <div class="scan-icon" aria-hidden="true">
                        <span></span>
                    </div>
                    <p>Készen áll a beolvasásra</p>
                </div>
            </div>

            <div id="player-container" class="player-container" hidden>
                <audio id="audio-player" controls></audio>
            </div>

            <p id="status" class="status" role="status">Nyomd meg a gombot a kamera indításához.</p>

            <button id="scan-btn" class="scan-button" type="button">
                <span class="button-icon" aria-hidden="true"></span>
                <span id="scan-btn-label">Beolvasás indítása</span>
            </button>
        </section>
    </main>

    <script src="app.js"></script>
</body>

</html>
